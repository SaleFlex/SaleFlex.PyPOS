[app]
version         = "1.0.0b8"
icon            = "static_files\\images\\saleflex.ico"
mode            = "standalone"  # standalone | office | gate
terminal_code   = "POS-001"     # This terminal's identifier registered in OFFICE or/and GATE
store_code      = "STORE-001"   # This store's identifier registered in OFFICE or/and GATE
office_code     = "OFFICE-001"

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# Write Console? (true/false)
console = true
# Write log file? (true/false)
file = true
# Log folder
log_dir = "logs"
# Log filename
log_file = "saleflex.log"

[database]
engine = "sqlite"
driver = ""
user_name = ""
password = ""
database_name = "pos.sqlite3"

# ─────────────────────────────────────────────────────────────────────────────
# Integration mode routing:
# - mode = "standalone" -> no remote sync, local-only behavior
# - mode = "office"     -> connect to [office]
# - mode = "gate"       -> connect to [gate]
#
# SaleFlex.OFFICE endpoint configuration
# Used only when [app].mode = "office"
# ─────────────────────────────────────────────────────────────────────────────
[office]
base_url    = "127.0.0.1:9000"  # e.g. http://office.local:8710
api_key     = ""                # API key issued by SaleFlex.OFFICE
api_prefix  = "/api/v1"

# Which services are handled by OFFICE for this terminal?
manages_transactions = true
manages_closures     = true
manages_warehouse    = true
manages_campaign     = true
manages_loyalty      = true
manages_users        = true

# Sync behaviour (PyPOS <-> OFFICE)
sync_interval_minutes = 5
retry_attempts        = 3
timeout_seconds       = 10
notification_poll_interval_seconds = 30

# ─────────────────────────────────────────────────────────────────────────────
# SaleFlex.GATE endpoint configuration
# Used only when [app].mode = "gate"
# ─────────────────────────────────────────────────────────────────────────────
[gate]
base_url    = "127.0.0.1:8000"  # e.g. https://your-gate.example.com
api_key     = ""                # API key issued by SaleFlex.GATE
api_prefix  = "/api/v1"

# Which services does GATE manage?
# When true, the corresponding third_party.* connector is ignored.
manages_transactions = true
manages_closures     = true
manages_warehouse    = true
manages_campaign     = false
manages_erp          = false
manages_payment      = false

# Sync behaviour
sync_interval_minutes = 30   # How often SyncWorker flushes the outbox
retry_attempts        = 3    # Max push retries before marking as "failed"
timeout_seconds       = 10   # Per-request HTTP timeout

# Real-time notification polling (terminal messages, cache-refresh signals)
notification_enabled              = false
notification_poll_interval_seconds = 60

# ─────────────────────────────────────────────────────────────────────────────
# Third-party direct connectors
# Each section is active only when the corresponding gate.manages_* = false.
# ─────────────────────────────────────────────────────────────────────────────

[third_party.erp]
type            = ""    # "sap" | "oracle" | "logo" | "netsis" | "custom"
base_url        = ""
api_key         = ""
timeout_seconds = 15

[third_party.payment]
type            = ""    # "iyzico" | "paytr" | "stripe" | "nets" | "custom"
base_url        = ""
api_key         = ""
timeout_seconds = 30

[third_party.campaign]
type     = ""           # "custom"
base_url = ""
api_key  = ""