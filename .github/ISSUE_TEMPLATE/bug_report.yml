name: Bug Report
description: Report a bug or unexpected behavior in SaleFlex.PyPOS
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Open the application
        2. Navigate to...
        3. Click on...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - Ubuntu / Debian
        - Other Linux
        - macOS
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.8
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database Backend
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - Other
    validations:
      required: true

  - type: input
    id: pos_version
    attributes:
      label: SaleFlex.PyPOS Version
      placeholder: e.g. v1.0.0b6
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste relevant lines from logs/saleflex.log
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, config snippets, or any other context.
